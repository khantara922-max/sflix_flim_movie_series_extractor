name: SFlix Scraper

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120      # max 2 hours before GitHub kills it

    permissions:
      contents: write         # needed to push results back to repo

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install Chrome + ChromeDriver ────────────────────────────────────
      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install ChromeDriver (matching Chrome version)
        run: |
          CHROME_VER=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          CHROME_MAJOR=$(echo $CHROME_VER | cut -d. -f1)
          echo "Chrome version: $CHROME_VER  (major: $CHROME_MAJOR)"

          # Chrome 115+ uses the new endpoint
          if [ "$CHROME_MAJOR" -ge 115 ]; then
            DRIVER_URL=$(curl -s \
              "https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json" \
              | python3 -c "
import sys, json
data = json.load(sys.stdin)
versions = data['versions']
target = '$CHROME_VER'
# Find exact or closest major match
match = None
for v in reversed(versions):
  if v['version'].startswith('$CHROME_MAJOR.'):
    downloads = v.get('downloads', {}).get('chromedriver', [])
    for d in downloads:
      if d['platform'] == 'linux64':
        match = d['url']
        break
  if match:
    break
print(match or '')
")
            echo "ChromeDriver URL: $DRIVER_URL"
            wget -q "$DRIVER_URL" -O /tmp/chromedriver.zip
          else
            DRIVER_VER=$(curl -s \
              "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_${CHROME_MAJOR}")
            wget -q \
              "https://chromedriver.storage.googleapis.com/${DRIVER_VER}/chromedriver_linux64.zip" \
              -O /tmp/chromedriver.zip
          fi

          unzip -q /tmp/chromedriver.zip -d /tmp/chromedriver_extracted
          DRIVER_BIN=$(find /tmp/chromedriver_extracted -name "chromedriver" -type f | head -1)
          sudo mv "$DRIVER_BIN" /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      # ── 4. Install Python deps ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install --upgrade selenium urllib3

      # ── 5. Run scraper ───────────────────────────────────────────────────────
      - name: Run SFlix scraper
        run: python sflix_scraper.py --out full_movie_urls.txt

      # ── 6. Write run metadata ────────────────────────────────────────────────
      - name: Write last-run info
        run: |
          COUNT=$(wc -l < full_movie_urls.txt)
          echo "Last run : $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >  last_run.txt
          echo "URLs found: $COUNT"                              >> last_run.txt

      # ── 7. Commit & push results ─────────────────────────────────────────────
      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add full_movie_urls.txt last_run.txt
          # Only commit if something changed
          git diff --cached --quiet || \
            git commit -m "chore: update movie URLs [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
